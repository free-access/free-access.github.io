    <script type="text/javascript">
        // URL padrão caso o idioma não corresponda a nenhum dos mapeados abaixo
        const urlPadrao = "https://t.mbjms.com/204777/3785/0?target=domainredirects&po=6456&aff_sub5=SF_006OG000004lmDN";

        // Mapeamento de URLs baseado nas variações de idioma/país do navegador
        const urlsPorIdioma = {
            // Austrália
            "en-AU": "https://t.crdtg2.com/204777/10259/0?aff_sub5=SF_006OG000004lmDN",
            
            // Canadá (Inglês e Francês canadense)
            "en-CA": "https://t.crdtg2.com/204777/10259/0?aff_sub5=SF_006OG000004lmDN",
            "fr-CA": "https://t.crdtg2.com/204777/10259/0?aff_sub5=SF_006OG000004lmDN",
            
            // Dinamarca
            "da": "https://t.crdtg2.com/204777/10259/0?aff_sub5=SF_006OG000004lmDN",
            "da-DK": "https://t.crdtg2.com/204777/10259/0?aff_sub5=SF_006OG000004lmDN",
            
            // Irlanda
            "en-IE": "https://t.crdtg2.com/204777/10259/0?aff_sub5=SF_006OG000004lmDN",
            "ga-IE": "https://t.crdtg2.com/204777/10259/0?aff_sub5=SF_006OG000004lmDN", // Irlandês nativo
            
            // Nova Zelândia
            "en-NZ": "https://t.crdtg2.com/204777/10259/0?aff_sub5=SF_006OG000004lmDN",
            
            // Noruega
            "no": "https://t.crdtg2.com/204777/10259/0?aff_sub5=SF_006OG000004lmDN",
            "nb": "https://t.crdtg2.com/204777/10259/0?aff_sub5=SF_006OG000004lmDN", // Bokmål norueguês
            "nn": "https://t.crdtg2.com/204777/10259/0?aff_sub5=SF_006OG000004lmDN", // Nynorsk norueguês
            
            // Reino Unido
            "en-GB": "https://t.crdtg2.com/204777/10259/0?aff_sub5=SF_006OG000004lmDN",
            
            // Estados Unidos
            "en-US": "https://t.crdtg2.com/204777/10259/0?aff_sub5=SF_006OG000004lmDN"
        };

        // Captura o idioma principal do navegador (ex: "en-US", "da", "pt-BR")
        const idiomaNavegador = navigator.language || navigator.userLanguage;

        // Tenta redirecionar pelo código exato (ex: "en-US")
        if (urlsPorIdioma[idiomaNavegador]) {
            window.location.href = urlsPorIdioma[idiomaNavegador];
        } else {
            // Se não achar o exato, tenta pegar apenas as duas primeiras letras (ex: se for "da-CH", vira "da")
            const idiomaCurto = idiomaNavegador.split('-')[0];
            
            if (urlsPorIdioma[idiomaCurto]) {
                window.location.href = urlsPorIdioma[idiomaCurto];
            } else if (idiomaCurto === 'en') {
                // Tratamento especial: Se o navegador for em inglês genérico ("en"), direciona para os EUA por padrão
                window.location.href = urlsPorIdioma["en-US"];
            } else {
                // Caso não seja nenhum dos idiomas listados, usa o link padrão
                window.location.href = urlPadrao;
            }
        }
    </script>
